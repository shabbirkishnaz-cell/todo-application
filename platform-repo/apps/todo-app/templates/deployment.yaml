apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app

  template:
    metadata:
      labels:
        app: todo-app

    spec:
      containers:
        - name: todo-app
          image: 057165950410.dkr.ecr.us-east-1.amazonaws.com/todo-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8501   # streamlit
            - containerPort: 8000   # prometheus metrics

          envFrom:
            - configMapRef:
                name: todo-app-db-config
            - secretRef:
                name: todo-app-db-secret

          env:
            - name: APP_NAME
              value: "todo-app"
            - name: APP_ENV
              value: "prod"
            - name: APP_VERSION
              value: "1.0"
            - name: STREAMLIT_SERVER_HEADLESS
              value: "true"
            - name: STREAMLIT_SERVER_ENABLE_CORS
              value: "false"
            - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
              value: "false"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting streamlit..."
              exec streamlit run web.py \
                --server.port 8501 \
                --server.address 0.0.0.0 \
                --server.headless true \
                --server.enableCORS false \
                --server.enableXsrfProtection false

          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3