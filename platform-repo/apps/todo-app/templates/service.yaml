apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-app.fullname" . }}
  labels:
    app: {{ include "todo-app.name" . | quote }}
    app.kubernetes.io/name: {{ include "todo-app.name" . | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Values.appVersion | default .Chart.AppVersion | quote }}
    env: {{ (.Values.appEnv | default "prod") | quote }}
    team: {{ (.Values.team | default "platform") | quote }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "todo-app.name" . | quote }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP

    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: {{ .Values.service.metricsPort }}
      protocol: TCP
