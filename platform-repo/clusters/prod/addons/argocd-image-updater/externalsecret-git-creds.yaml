apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-image-updater-git-creds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: argocd-image-updater-git-creds
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: eksdemo2/prod/argocd-image-updater/git-creds
        property: username
    - secretKey: password
      remoteRef:
        key: eksdemo2/prod/argocd-image-updater/git-creds
        property: password
