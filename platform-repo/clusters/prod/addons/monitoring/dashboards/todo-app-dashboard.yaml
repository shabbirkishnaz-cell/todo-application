apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-todo-app
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  todo-app-dashboard.json: |
    {
      "title": "Todo App Monitoring",
      "panels": [
        {
          "type": "timeseries",
          "title": "Requests per second",
          "targets": [
            { "expr": "sum(rate(todo_app_requests_total[5m]))" }
          ]
        },
        {
          "type": "stat",
          "title": "Todo Count",
          "targets": [
            { "expr": "todo_app_todos_count" }
          ]
        }
      ]
    }
