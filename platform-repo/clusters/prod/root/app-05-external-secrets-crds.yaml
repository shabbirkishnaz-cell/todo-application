apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/external-secrets/external-secrets
    targetRevision: v0.10.7
    path: deploy/crds
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd   # any existing namespace is fine for CRDs
  syncPolicy: 
    syncOptions:
      - ServerSideApply=true
      - Replace=true
